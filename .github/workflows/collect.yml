name: Collect Steam New Releases

on:
  workflow_dispatch:          # 수동 실행 버튼 (Actions 탭에서 누르면 즉시 실행)
  schedule:
    - cron: '0 0 * * 1'       # 매주 월요일 00:00 UTC 자동 실행

permissions:
  contents: write             # data.json 커밋/푸시 권한

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Run collector
        env:
          GAMES_POPULARITY_KEY: ${{ secrets.GAMES_POPULARITY_KEY }}
        run: python fetch_steam.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.json
          git commit -m "Update Steam data" || echo "변경 없음 - 스킵"
          git push
